name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    name: build & test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (with coverage gate on src/core)
        run: pnpm coverage

      - name: Build
        run: pnpm build

  # Prove each adapter end-to-end against a real example project, asserting BOTH
  # directions: `speclock check` exits 0 when mapped tests pass, and non-zero when
  # a mapped test is deleted or made to fail.
  examples:
    name: example (${{ matrix.runner }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: vitest, dir: examples/vitest-demo }
          - { runner: jest, dir: examples/jest-demo }
          - { runner: pytest, dir: examples/pytest-demo }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm

      - name: Set up Python
        if: matrix.runner == 'pytest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        if: matrix.runner == 'pytest'
        run: python -m pip install --upgrade pip pytest

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify ${{ matrix.runner }} adapter (both directions)
        run: node scripts/verify-example.mjs ${{ matrix.dir }} ${{ matrix.runner }}

  # Prove speclock is publish-ready: `npm pack`, install the tarball into a
  # throwaway project, and run the `speclock` bin from it. Does not publish.
  package:
    name: package (pack + install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Verify package (pack + install + run from tarball)
        run: node scripts/verify-package.mjs

  # The ultimate proof: speclock gates itself on its own spec — AND it does it
  # through speclock's own reusable composite action (dogfooding the action). The
  # action builds speclock and installs deps (incl. vitest) in the checkout, then
  # runs `speclock check` against this repo's SPEC.md + specs/spec.yaml.
  self-gate:
    name: speclock checks speclock (via the action)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          runner: vitest
